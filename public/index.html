<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA - Minimalist Home Objects</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero-section {
      text-align: center;
      padding: 4rem 1rem 6rem 1rem;
      max-width: 800px;
      margin: 0 auto;
    }
    .hero-title {
      font-size: 3.5rem;
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }
    .hero-subtitle {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto;
      font-weight: 300;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <header data-active-page="shop"></header>

  <!-- Hero Banner -->
  <section class="hero-section">
    <h1 class="hero-title">Simplicity in Form & Function</h1>
    <p class="hero-subtitle">A collection of thoughtfully crafted objects for the modern, minimalist living space.</p>
    
    <!-- Search Bar Container -->
    <div class="search-container">
      <form id="search-form" autocomplete="off" onsubmit="event.preventDefault();">
        <div class="search-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search objects..." aria-label="Search products">
          <button type="submit" class="search-submit-btn">Search</button>
        </div>
      </form>
      <!-- Auto Suggestions Dropdown -->
      <div id="search-suggestions" class="search-suggestions hidden"></div>
    </div>
  </section>

  <main style="padding-top: 0;">
    <!-- Catalog Filters & Controls -->
    <div class="catalog-controls">
      <div class="filter-group" id="category-filters">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="Furniture">Furniture</button>
        <button class="filter-btn" data-category="Decor">Decor</button>
        <button class="filter-btn" data-category="Lighting">Lighting</button>
        <button class="filter-btn" data-category="Textiles">Textiles</button>
      </div>
      <div class="select-wrapper">
        <select id="sort-select">
          <option value="">Sort By</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </div>
    </div>

    <!-- Loading Spinner & Errors -->
    <div id="catalog-loading" class="loading-spinner"></div>
    <div id="catalog-error" class="alert alert-error hidden" style="text-align: center; margin-bottom: 2rem;"></div>

    <!-- Products Grid -->
    <div class="products-grid" id="products-grid"></div>

    <!-- Empty State -->
    <div id="catalog-empty" class="empty-state hidden">
      <div class="empty-state-icon">Ø</div>
      <h2 class="empty-state-title">No Products Found</h2>
      <p class="empty-state-desc">We couldn't find any products matching your selection.</p>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer></footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
