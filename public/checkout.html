<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - AURA Store</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 1.20fr 0.80fr;
      gap: 3rem;
    }
  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <header></header>

  <main>
    <h1 class="page-title">Checkout</h1>

    <!-- Checkout Grid -->
    <div class="checkout-layout" id="checkout-container">
      
      <!-- Shipping Form -->
      <div class="white-container">
        <h2 style="font-weight: 300; margin-bottom: 2rem; border-bottom: var(--border-thin); padding-bottom: 0.5rem;">Shipping Details</h2>
        
        <div id="checkout-alert" class="alert hidden"></div>

        <form id="checkout-form">
          <div class="form-group">
            <label class="form-label" for="ship-name">Full Name</label>
            <input type="text" id="ship-name" class="form-control" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label class="form-label" for="ship-address">Address Line 1</label>
            <input type="text" id="ship-address" class="form-control" required placeholder="123 Minimalist Way">
          </div>
          <div class="form-group">
            <label class="form-label" for="ship-city">City</label>
            <input type="text" id="ship-city" class="form-control" required placeholder="New York">
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
              <label class="form-label" for="ship-zip">Postal / ZIP Code</label>
              <input type="text" id="ship-zip" class="form-control" required placeholder="10001">
            </div>
            <div class="form-group">
              <label class="form-label" for="ship-country">Country</label>
              <input type="text" id="ship-country" class="form-control" required placeholder="United States">
            </div>
          </div>
          <button type="submit" id="btn-submit-order" class="hidden"></button>
        </form>
      </div>

      <!-- Order Review Box -->
      <div class="summary-card">
        <h2 class="summary-title">Review Order</h2>
        <div id="checkout-items-list" style="margin-bottom: 2rem; border-bottom: var(--border-thin); padding-bottom: 1rem;">
          <!-- List of items in order -->
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="review-subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>Free</span>
        </div>
        <div class="summary-row">
          <span>Estimated Tax (10%)</span>
          <span id="review-tax">$0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="review-total">$0.00</span>
        </div>
        <button class="btn-primary" id="btn-trigger-checkout" style="width: 100%;">Complete Order</button>
      </div>

    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer></footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
