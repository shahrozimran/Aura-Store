<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Object - AURA Store</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      transition: var(--transition-fast);
    }
    .back-link:hover {
      color: var(--text-charcoal);
      transform: translateX(-4px);
    }
  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <header data-active-page="shop"></header>

  <main>
    <a href="index.html" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Objects
    </a>

    <!-- Loading Spinner & Errors -->
    <div id="product-loading" class="loading-spinner"></div>
    <div id="product-error" class="alert alert-error hidden" style="text-align: center;"></div>

    <!-- Product Detail Card -->
    <div class="product-detail-container hidden" id="product-container">
      <div class="detail-image-panel">
        <img id="product-image" class="detail-image" src="" alt="Product Image">
      </div>
      <div class="detail-info-panel">
        <span id="product-category" class="detail-cat">Category</span>
        <h1 id="product-title" class="detail-title">Product Title</h1>
        <div id="product-price" class="detail-price">$0.00</div>
        <p id="product-description" class="detail-desc">Product description goes here.</p>

        <!-- Actions -->
        <div class="action-row">
          <div class="quantity-selector">
            <button class="qty-btn" id="btn-decrease">-</button>
            <input type="text" class="qty-input" id="qty-input" value="1" readonly>
            <button class="qty-btn" id="btn-increase">+</button>
          </div>
          <button class="btn-primary" id="btn-add-to-cart">Add to Cart</button>
        </div>

        <div id="product-stock-status" class="stock-status">Checking stock...</div>

        <!-- Details specs -->
        <div style="margin-top: 2rem; border-top: var(--border-thin); padding-top: 1.5rem;">
          <h3 style="font-weight: 500; font-size: 0.9rem; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Specs & Features</h3>
          <ul id="product-features" style="list-style-type: square; margin-left: 1.25rem; color: var(--text-muted); font-size: 0.9rem; line-height: 1.6;">
            <!-- Specs will load here -->
          </ul>
        </div>
      </div>
    </div>

    <!-- Reviews Section -->
    <div class="reviews-section hidden" id="reviews-section" style="margin-top: 5rem; border-top: var(--border-thin); padding-top: 3.5rem;">
      <h2 style="font-weight: 300; font-size: 1.8rem; margin-bottom: 2rem; letter-spacing: -0.01em;">Customer Reviews</h2>
      <div class="reviews-grid" id="reviews-list">
        <!-- Review cards will load here -->
      </div>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer></footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
