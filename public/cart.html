<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - AURA Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Header -->
  <header></header>

  <main>
    <h1 class="page-title">Your Cart</h1>

    <!-- Cart Layout -->
    <div class="cart-page-layout hidden" id="cart-layout">
      <!-- Cart Items List -->
      <div class="cart-items-container" id="cart-items">
        <!-- Rendered dynamically -->
      </div>

      <!-- Order Summary Card -->
      <div class="summary-card">
        <h2 class="summary-title">Summary</h2>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="cart-subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>Free</span>
        </div>
        <div class="summary-row">
          <span>Estimated Tax (10%)</span>
          <span id="cart-tax">$0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="cart-total">$0.00</span>
        </div>
        <button class="btn-primary" id="btn-checkout" style="width: 100%;">Proceed to Checkout</button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="cart-empty">
      <div class="empty-state-icon">Ø</div>
      <h2 class="empty-state-title">Your Cart is Empty</h2>
      <p class="empty-state-desc">You haven't added any objects to your cart yet.</p>
      <a href="index.html" class="btn-primary">Browse Shop</a>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer></footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
