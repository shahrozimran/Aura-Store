<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - AURA Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Header -->
  <header data-active-page="orders"></header>

  <main>
    <h1 class="page-title">My Orders</h1>

    <!-- Loading Spinner & Errors -->
    <div id="orders-loading" class="loading-spinner"></div>
    <div id="orders-error" class="alert alert-error hidden" style="text-align: center;"></div>

    <!-- Orders List Container -->
    <div class="orders-list hidden" id="orders-list">
      <!-- Dynamic list of orders will be injected here -->
    </div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="orders-empty">
      <div class="empty-state-icon">Ø</div>
      <h2 class="empty-state-title">No Orders Yet</h2>
      <p class="empty-state-desc">You haven't placed any orders yet. Explore our curated shop!</p>
      <a href="index.html" class="btn-primary">Browse Shop</a>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer></footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
