<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - AURA Store</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Header -->
  <header data-active-page="auth"></header>

  <main>
    <div class="auth-container white-container">
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login">Login</div>
        <div class="auth-tab" id="tab-register">Register</div>
      </div>

      <!-- Alert Box -->
      <div id="auth-alert" class="alert hidden"></div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-control" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="hidden">
        <div class="form-group">
          <label class="form-label" for="register-username">Username</label>
          <input type="text" id="register-username" class="form-control" required placeholder="johndoe">
        </div>
        <div class="form-group">
          <label class="form-label" for="register-email">Email Address</label>
          <input type="email" id="register-email" class="form-control" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="register-password">Password</label>
          <input type="password" id="register-password" class="form-control" required placeholder="At least 6 characters">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
      </form>
    </div>
  </main>

  <!-- Dynamic Footer -->
  <footer></footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
